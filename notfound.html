<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - ページが見つかりません</title>
    <style>
        /* 基本スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa; /* 背景色を確実に設定 */
            color: #333; /* 文字色を濃いグレーに固定 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* heightからmin-heightに変更（はみ出し防止） */
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        /* エラー画像 */
        .error-image {
            width: 120px; /* スマホ向けに少し小さく調整 */
            height: auto;
            margin: 0 auto 20px;
            display: block;
            animation: sway 3s ease-in-out infinite;
        }

        /* 404の大きな数字 */
        h1 {
            font-size: 6rem; /* スマホで見切れないようサイズ調整 */
            margin: 0;
            font-weight: 900;
            color: #007bff; /* 青色 */
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }

        h2 {
            font-size: 1.3rem;
            margin: 15px 0;
            color: #333;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* ボタン */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background-color: #007bff;
            color: #ffffff !important; /* 文字色を白に強制 */
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="404.jpg" alt="[404 Image]" class="error-image">
        
        <h1>404</h1>
        
        <h2>ページが見つかりません</h2>
        <p>
            アクセスしようとしたページは削除されたか、<br>
            URLが間違っている可能性があります。
        </p>
        <a href="index.html" class="btn">トップページへ戻る</a>
    </div>

</body>
</html>
